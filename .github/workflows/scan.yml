name: SZPERACZ MIESZKANIOWY - Daily Scan

on:
  schedule:
    # 9:00 CET = 7:00 UTC (lato CEST)
    - cron: '0 7 * * *'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual scan'
        required: false
        default: 'Manual scan'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python main.py --scan

      - name: Commit and push data
        run: |
          git config user.name "SZPERACZ Bot"
          git config user.email "szperacz-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🏠 Scan: $(date '+%Y-%m-%d %H:%M') UTC"
          git push
